<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Venues — The Chicago Show Calendar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700;800&display=swap');

:root{
  --bg:#E9DCC1;
  --paper:#F6EEDC;
  --paper-2:#EFE4CC;
  --tomato:#E03C2C;
  --tomato-deep:#BE2E1F;
  --ink:#171210;
  --ink-soft:#6A5E50;
  --font-display:'Archivo Black','Arial Black',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,'SF Mono','Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#app{height:100%;}
body{margin:0;}

.csc{
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  background:var(--bg); color:var(--ink);
  font-family:var(--font-mono); font-size:14px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
.csc *::selection{ background:var(--tomato); color:var(--paper); }

/* ---------- TOP BAR (copied from calendar) ---------- */
.topbar{
  display:flex; align-items:stretch; justify-content:space-between;
  border-bottom:3px solid var(--ink); background:var(--paper);
  flex:0 0 auto;
}
.wordmark{
  font-family:var(--font-display); color:var(--ink);
  font-size:20px; letter-spacing:-.02em; line-height:1;
  padding:14px 18px; text-transform:uppercase;
  display:flex; align-items:center; text-decoration:none;
}
.wordmark .dot{ color:var(--tomato); }
.topbar-meta{
  display:flex; align-items:center; gap:18px;
  padding:0 18px; font-size:11px; letter-spacing:.14em;
  text-transform:uppercase; color:var(--ink-soft);
  border-left:3px solid var(--ink);
}
.topnav{
  color:var(--ink); text-decoration:none; font-weight:700;
  border-bottom:2px solid transparent; padding:2px 0;
  transition: color .1s, border-color .1s;
}
.topnav:hover{ color:var(--tomato); border-bottom-color:var(--tomato); }
@media (max-width:720px){
  .topbar-meta{ padding:0 12px; gap:12px; }
  .topbar-meta .loc{ display:none; }
  .wordmark{ font-size:15px; padding:12px 14px; }
}

/* ---------- PANES (3-column stage with slide) ---------- */
.panes{ flex:1 1 auto; min-height:0; position:relative; overflow:hidden; }
.stage{
  display:flex; height:100%; width:150%;
  transition: transform 320ms cubic-bezier(0.4, 0, 0.2, 1);
  transform: translateX(0);
}
.stage.show-active{ transform: translateX(-33.333%); }

.listpane, .detailpane, .showpane{
  flex:0 0 33.333%; display:flex; flex-direction:column; min-height:0;
}
.listpane{
  background:var(--paper); border-right:3px solid var(--ink);
  overflow-y:auto;
}
.detailpane{
  background:var(--bg); border-right:3px solid var(--ink);
  overflow-y:auto;
}
.detailpane > #detail{ display:flex; flex-direction:column; min-height:100%; }
.detailpane > #detail > .rest{ flex:1 1 auto; }
.showpane{
  background:var(--bg);
  overflow-y:auto;
}
.showpane > #showdetail{ display:flex; flex-direction:column; min-height:100%; }

/* Mobile: single visible column, overlay pattern via translate on stage.
   List(0), Detail(-100vw), Show(-200vw) — each state slides everything left by 100vw. */
@media (max-width:820px){
  .stage{ width:300%; transition: transform 240ms cubic-bezier(0.4, 0, 0.2, 1); }
  .stage.venue-active{ transform: translateX(-33.333%); }
  .stage.show-active{ transform: translateX(-66.666%); }
  .listpane, .detailpane, .showpane{ flex:0 0 33.333%; }
  .listpane, .detailpane{ border-right:none; }
}

/* ---------- LEFT PANE: title slab + grouped list ---------- */
.slab{
  flex:0 0 auto; background:var(--paper);
  border-bottom:3px solid var(--ink); padding:14px 16px 12px;
  position:sticky; top:0; z-index:5;
}
.slab .kicker{ font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--tomato); font-weight:700; }
.slab .big{
  font-family:var(--font-display); text-transform:uppercase;
  font-size:clamp(28px,5vw,46px); line-height:.92; letter-spacing:-.02em;
  margin-top:2px;
}
.slab .count{ font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft); margin-top:6px; }
.slab .count b{ color:var(--ink); }

/* ---------- CONTROLS BAR (steal from calendar) ---------- */
.controls{
  flex:0 0 auto; display:flex;
  background:var(--paper); border-bottom:3px solid var(--ink);
  position:sticky; top:0; z-index:4;
}
.ctrl-btn{
  flex:1; display:flex; align-items:center; justify-content:center; gap:8px;
  font-family:var(--font-mono); font-weight:800; font-size:12px;
  letter-spacing:.12em; text-transform:uppercase;
  background:var(--paper); color:var(--ink);
  border:none; border-right:3px solid var(--ink); padding:11px 14px; cursor:pointer;
  transition:background .07s linear, color .07s linear;
}
.ctrl-btn:last-child{ border-right:none; }
.ctrl-btn:hover{ background:var(--paper-2); }
.ctrl-btn.open{ background:var(--tomato); color:var(--paper); }
.ctrl-btn .caret{ font-size:9px; }
.ctrl-btn .badge{
  background:var(--ink); color:var(--paper);
  font-size:10px; font-weight:800; padding:1px 6px; line-height:1.4;
}
.ctrl-btn.open .badge{ background:var(--paper); color:var(--tomato); }

.panel{
  flex:0 0 auto; background:var(--paper); border-bottom:3px solid var(--ink);
  padding:10px 12px; display:flex; flex-direction:column; gap:8px;
}
.frow{ display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
.flabel{ font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft); flex:0 0 auto; margin-right:4px; }
.chip{
  font-family:var(--font-mono); font-size:11px; font-weight:700;
  letter-spacing:.04em; text-transform:uppercase;
  background:var(--paper); color:var(--ink);
  border:2px solid var(--ink); padding:3px 9px; cursor:pointer;
  transition:transform .07s linear, box-shadow .07s linear;
}
.chip:hover{ box-shadow:2px 2px 0 var(--ink); transform:translate(-1px,-1px); }
.chip.on{ background:var(--tomato); color:var(--paper); box-shadow:2px 2px 0 var(--ink); }
.chip.clear{ background:var(--ink); color:var(--paper); margin-left:auto; }
.chip.clear:hover{ background:var(--tomato-deep); }

.hood-group{ padding:0; }
.hood-title{
  font-family:var(--font-mono); font-size:13px; font-weight:800;
  letter-spacing:.18em; text-transform:uppercase; color:var(--tomato);
  padding:22px 16px 8px;
  display:flex; align-items:baseline; justify-content:space-between; gap:12px;
  background:var(--paper);
  border-bottom:2px solid rgba(224,60,44,0.25);
  margin-bottom:2px;
}
.hood-title.missing{ color:var(--ink-soft); border-bottom-color:rgba(106,94,80,0.2); }
.hood-title .hood-count{ font-size:11px; color:var(--ink-soft); font-weight:700; letter-spacing:.1em; }

.vlist{ list-style:none; margin:0; padding:0; }
.vrow{
  display:block; width:100%; text-align:left; cursor:pointer;
  background:var(--paper); color:var(--ink);
  border:none; border-left:5px solid transparent;
  border-top:2px dotted rgba(23,18,16,0.25);
  padding:12px 16px;
  font-family:var(--font-display); font-size:16px; line-height:1.15;
  text-transform:uppercase; letter-spacing:-.01em;
  transition:background .07s linear, border-color .07s linear;
}
.vrow:hover{ background:var(--paper-2); border-left-color:var(--tomato); }
.vrow.sel{ background:var(--tomato); color:var(--paper); border-left-color:var(--ink); }

/* ---------- RIGHT PANE: detail + at-rest wall ---------- */
.d-back{
  display:none; width:100%; text-align:left;
  position:sticky; top:0; z-index:5;
  font-family:var(--font-display); text-transform:uppercase;
  font-size:16px; letter-spacing:-.01em;
  background:var(--tomato); color:var(--paper);
  border:none; border-bottom:3px solid var(--ink);
  padding:15px 16px; cursor:pointer;
  align-items:center; gap:10px;
}
.d-back .arr{
  font-family:var(--font-mono); font-weight:800; font-size:14px;
  border:2px solid var(--paper); padding:1px 8px; line-height:1.3;
}
.d-back:hover{ background:var(--tomato-deep); }
@media (max-width:820px){ .detailpane.open .d-back{ display:flex; } }

.d-head{ background:var(--tomato); color:var(--paper); border-bottom:3px solid var(--ink); padding:20px 20px 18px; }
.d-head .kicker{ font-size:11px; letter-spacing:.16em; text-transform:uppercase; font-weight:700; }
.d-head .name{
  font-family:var(--font-display); text-transform:uppercase;
  font-size:clamp(30px,4.6vw,52px); line-height:.9; letter-spacing:-.02em; margin-top:8px;
}
.d-head .aka{ font-size:11px; letter-spacing:.08em; text-transform:uppercase; margin-top:10px; opacity:.85; }


.d-facts{ display:flex; gap:0; border-bottom:3px solid var(--ink); background:var(--paper); }
.d-fact{ flex:1; padding:11px 14px; border-right:2px solid var(--ink); }
.d-fact:last-child{ border-right:none; }
.d-fact .k{ font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft); }
.d-fact .v{ font-family:var(--font-display); font-size:18px; text-transform:uppercase; margin-top:3px; }
.d-fact .v.dim{ color:var(--ink-soft); }

/* ---------- SHOW DETAIL (ported from calendar page) ---------- */
.d-back{
  width:100%; text-align:left;
  position:sticky; top:0; z-index:6;
  font-family:var(--font-display); text-transform:uppercase;
  font-size:16px; letter-spacing:-.01em;
  background:var(--tomato); color:var(--paper);
  border:none; border-bottom:3px solid var(--ink);
  padding:15px 16px; cursor:pointer;
  display:flex; align-items:center; gap:10px;
}
.d-back .arr{
  font-family:var(--font-mono); font-weight:800; font-size:14px;
  border:2px solid var(--paper); padding:1px 8px; line-height:1.3;
}
.d-back:hover{ background:var(--tomato-deep); }
.d-ticket{
  display:inline-block; margin-top:14px;
  font-family:var(--font-mono); font-weight:800; font-size:12px; letter-spacing:.08em;
  text-transform:uppercase; text-decoration:none;
  background:var(--paper); color:var(--ink); border:2px solid var(--ink);
  padding:8px 12px; box-shadow:3px 3px 0 var(--ink); cursor:pointer;
  transition:transform .07s linear, box-shadow .07s linear;
}
.d-ticket:hover{ transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--ink); }
.d-ticket:active{ transform:translate(3px,3px); box-shadow:0 0 0 var(--ink); }
.d-poster{ background:var(--ink); border-bottom:3px solid var(--ink); }
.d-poster img{ display:block; width:100%; height:360px; object-fit:contain; background:var(--ink); }
.lineup-group + .lineup-group{ margin-top:14px; padding-top:12px; border-top:3px solid var(--ink); }
.role-label{
  font-family:var(--font-mono); font-size:10px; font-weight:700;
  letter-spacing:.16em; text-transform:uppercase; color:var(--tomato); margin-bottom:6px;
}
.artist{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:9px 0; border-top:2px dotted var(--ink);
}
.artist:first-of-type{ border-top:none; }
.artist .nm{ font-family:var(--font-display); text-transform:uppercase; font-size:18px; line-height:1; letter-spacing:-.01em; }
.artist .gn{ font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft); margin-top:4px; }
.spot{
  flex:0 0 auto; font-family:var(--font-mono); font-weight:800; font-size:11px;
  letter-spacing:.08em; text-transform:uppercase; text-decoration:none;
  background:var(--paper); color:var(--ink); border:2px solid var(--ink);
  padding:6px 10px; box-shadow:3px 3px 0 var(--ink); cursor:pointer;
  transition:transform .07s linear, box-shadow .07s linear, background .07s linear;
}
.spot:hover{ background:var(--tomato); color:var(--paper); transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--ink); }
.spot:active{ transform:translate(3px,3px); box-shadow:0 0 0 var(--ink); }
.v-name{ font-family:var(--font-display); text-transform:uppercase; font-size:18px; letter-spacing:-.01em; margin-bottom:6px; }
.venue-info p{ font-size:13px; color:var(--ink); }
.venue-info .addr{ color:var(--ink-soft); letter-spacing:.04em; }

/* ---------- TABS ---------- */
.tabs{
  display:flex; background:var(--paper); border-bottom:3px solid var(--ink);
  flex:0 0 auto;
}
.tab-btn{
  flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
  font-family:var(--font-mono); font-weight:800; font-size:11px;
  letter-spacing:.12em; text-transform:uppercase;
  background:var(--paper); color:var(--ink);
  border:none; border-right:3px solid var(--ink); padding:12px 10px; cursor:pointer;
  transition:background .07s linear, color .07s linear;
}
.tab-btn:last-child{ border-right:none; }
.tab-btn:hover{ background:var(--paper-2); }
.tab-btn.on{ background:var(--ink); color:var(--paper); }
.tab-btn .n{
  font-size:10px; font-weight:800; padding:1px 6px; line-height:1.4;
  background:rgba(23,18,16,0.08); color:var(--ink);
}
.tab-btn.on .n{ background:var(--paper); color:var(--ink); }
.tab-btn .n.dim{ color:var(--ink-soft); }

/* ---------- VENUE DETAILS TAB CONTENT ---------- */
.blurb{
  padding:18px 20px; border-bottom:2px solid var(--ink); background:var(--paper);
  font-size:14px; line-height:1.55;
}
.kv-grid{ display:flex; flex-direction:column; gap:0; padding:0; margin:0; }
.kv-grid li{
  display:grid; grid-template-columns:150px 1fr; gap:16px;
  padding:12px 20px; list-style:none;
  border-top:1px solid rgba(23,18,16,0.15);
  font-size:13px; line-height:1.5;
}
.kv-grid li:first-child{ border-top:none; }
.kv-grid .k{
  font-family:var(--font-mono); font-size:10px; font-weight:700;
  letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft);
  padding-top:2px;
}
.kv-grid .v{ color:var(--ink); }
.kv-grid a{ color:var(--tomato); text-decoration:none; border-bottom:1px solid var(--tomato); }
.kv-grid a:hover{ background:var(--tomato); color:var(--paper); }
.tag-list{ display:flex; flex-wrap:wrap; gap:6px; }
.tag-list .tag{
  font-family:var(--font-mono); font-size:10px; font-weight:700;
  letter-spacing:.08em; text-transform:uppercase;
  background:var(--paper); color:var(--ink);
  border:1.5px solid var(--ink); padding:2px 8px;
}
.notes-list{ padding:0 20px 4px; list-style:none; }
.notes-list li{
  font-size:13px; line-height:1.55; padding:8px 0 8px 16px; position:relative;
  border-bottom:1px dotted rgba(23,18,16,0.15);
}
.notes-list li:last-child{ border-bottom:none; }
.notes-list li:before{ content:"—"; position:absolute; left:0; color:var(--tomato); }

.section{ padding:16px 20px; border-bottom:2px solid var(--ink); }
.section h3{
  font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--tomato);
  font-weight:700; font-family:var(--font-mono); margin-bottom:12px;
}
.subrooms{ list-style:none; display:flex; flex-wrap:wrap; gap:8px; }
.subrooms .chip{
  font-family:var(--font-mono); font-size:11px; font-weight:700;
  letter-spacing:.04em; text-transform:uppercase;
  background:var(--paper); color:var(--ink);
  border:2px solid var(--ink); padding:3px 9px; cursor:pointer;
}
.subrooms .chip:hover{ box-shadow:2px 2px 0 var(--ink); transform:translate(-1px,-1px); background:var(--tomato); color:var(--paper); }

.showlist{ list-style:none; }
.showlist li{
  padding:0; border-top:2px dotted var(--ink);
}
.showlist li:first-child{ border-top:none; }
.showrow{
  display:flex; align-items:baseline; gap:14px;
  width:100%; padding:12px 0; text-align:left;
  background:transparent; color:inherit; border:none; cursor:pointer;
  border-left:5px solid transparent; padding-left:8px; margin-left:-13px;
  transition:background .07s linear, border-color .07s linear, color .07s linear;
}
.showrow:hover{ background:var(--paper); border-left-color:var(--tomato); }
.showrow:hover .who{ color:var(--tomato); }
.showrow.sel{ background:var(--tomato); border-left-color:var(--ink); }
.showrow.sel .who{ color:var(--paper); }
.showrow.sel .when{ color:var(--paper); }
.showrow.sel .price{ color:var(--paper); }
.showrow.sel .price.free{ color:var(--paper); }
.showrow .when{
  flex:0 0 auto; width:78px;
  font-family:var(--font-mono); font-weight:800; font-size:11px;
  letter-spacing:.06em; text-transform:uppercase;
}
.showrow .who{
  flex:1 1 auto;
  font-family:var(--font-display); font-size:16px;
  text-transform:uppercase; line-height:1.1; letter-spacing:-.01em;
}
.showrow .price{
  flex:0 0 auto; font-size:11px; font-weight:800; letter-spacing:.03em;
  color:var(--ink-soft); text-transform:uppercase; padding-right:20px;
}
.showrow .price.free{ color:var(--tomato); }

/* ---------- AT-REST REPETITION WALL ---------- */
.rest{
  height:100%; overflow:hidden; background:var(--bg);
  display:flex; flex-direction:column;
}
.rest .invite{
  flex:0 0 auto;
  background:var(--ink); color:var(--paper);
  font-size:16px; letter-spacing:.16em; text-transform:uppercase; font-weight:800;
  padding:18px 20px; border-bottom:3px solid var(--ink);
}
.rest .wall{
  flex:1 1 auto; overflow:hidden;
  padding:0; user-select:none; pointer-events:none;
  font-family:var(--font-display); text-transform:uppercase;
  font-size:clamp(15px, 1.7vw, 22px);
  line-height:1.05; letter-spacing:-.005em;
  word-spacing:-.05em;
  /* text wraps naturally; entire block fills margin-to-margin */
}
.rest .wall span{ padding:0 4px; white-space:nowrap; }
.rest .wall span:nth-child(odd){ color:var(--tomato); }
.rest .wall span:nth-child(even){ color:var(--ink); }
.rest .wall span:nth-child(7n){ font-style:italic; }

.loading, .empty{
  padding:40px 20px; color:var(--ink-soft);
  font-size:12px; letter-spacing:.14em; text-transform:uppercase;
}
</style>
</head>
<body>
  <div class="csc">
    <header class="topbar">
      <a class="wordmark" href="/">THE CHICAGO SHOW CALENDAR<span class="dot">.</span></a>
      <nav class="topbar-meta">
        <a href="/" class="topnav">CALENDAR</a>
        <span class="loc">CHICAGO IL</span>
      </nav>
    </header>

    <div class="panes">
      <div class="stage" id="stage">
        <aside class="listpane" id="listpane">
          <div class="slab">
            <div class="kicker" id="slab-kicker">All neighborhoods</div>
            <div class="big">VENUES</div>
            <div class="count" id="count">Loading…</div>
          </div>
          <div class="controls" id="controls">
            <button class="ctrl-btn" id="btn-filter">
              <span>FILTER</span>
              <span class="badge" id="filter-badge" style="display:none">0</span>
              <span class="caret">▾</span>
            </button>
            <button class="ctrl-btn" id="btn-sort">
              <span>SORT</span>
              <span class="badge" id="sort-badge" style="display:none">HOOD</span>
              <span class="caret">▾</span>
            </button>
          </div>
          <div id="filter-panel" style="display:none"></div>
          <div id="sort-panel" style="display:none"></div>
          <div id="list"><p class="loading">Loading venues…</p></div>
        </aside>

        <section class="detailpane" id="detailpane">
          <div id="detail"></div>
        </section>

        <section class="showpane" id="showpane">
          <div id="showdetail"></div>
        </section>
      </div>
    </div>
  </div>

  <script>
    const normName = (s) => String(s || "").toLowerCase().replace(/^the\s+/, "").replace(/[^a-z0-9]+/g, " ").trim();
    const cmpName = (a, b) => normName(a.name).localeCompare(normName(b.name));
    const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    const SORTS = [
      { key: "hood", label: "By neighborhood", grouped: true },
      { key: "az",   label: "A–Z",             grouped: false },
      { key: "shows", label: "Most shows",     grouped: false },
    ];

    const state = {
      venues: [], shows: [], details: {}, selectedId: null,
      selectedShowId: null,       // when set, the showpane is active
      showCount: new Map(),       // venueId -> upcoming show count
      hoods: [],                  // sorted list of unique hoods present
      filter: {
        withShowsOnly: false,
        hideSubrooms: false,
        hoods: new Set(),         // empty = all
      },
      sortKey: "hood",
      openPanel: null,            // "filter" | "sort" | null
      activeTab: "upcoming",      // "upcoming" | "details"
    };

    Promise.all([
      fetch("venue-registry.json").then((r) => r.ok ? r.json() : Promise.reject(new Error(`registry ${r.status}`))),
      fetch("shows.json").then((r) => r.ok ? r.json() : []),
      fetch("venue-details.json").then((r) => r.ok ? r.json() : {}).catch(() => ({})),
    ])
      .then(([venues, shows, details]) => {
        state.venues = venues;
        state.shows = Array.isArray(shows) ? shows : [];
        state.details = details && typeof details === "object" ? details : {};
        buildShowCounts();
        state.hoods = [...new Set(venues.map((v) => v.hood).filter(Boolean))].sort();
        renderControls();
        renderList();
        renderRest(); // initial detail-pane content until user picks a venue
      })
      .catch((e) => {
        document.getElementById("list").innerHTML = `<p class="empty">Couldn't load venues (${esc(e.message)}).</p>`;
        document.getElementById("count").textContent = "";
      });

    function buildShowCounts() {
      state.showCount = new Map();
      // Prefer venueId match; fall back to normalized name match.
      const byId = new Map();
      const byNorm = new Map();
      for (const s of state.shows) {
        if (s.venueId) byId.set(s.venueId, (byId.get(s.venueId) || 0) + 1);
        const nn = normName(s.venue);
        if (nn) byNorm.set(nn, (byNorm.get(nn) || 0) + 1);
      }
      for (const v of state.venues) {
        const c = byId.get(v.id) ?? byNorm.get(normName(v.name)) ?? 0;
        state.showCount.set(v.id, c);
      }
    }

    // ---------- filter + sort ----------
    function applyFilter(venues) {
      const f = state.filter;
      return venues.filter((v) => {
        if (f.withShowsOnly && (state.showCount.get(v.id) || 0) === 0) return false;
        if (f.hideSubrooms && v.parent) return false;
        if (f.hoods.size > 0 && !f.hoods.has(v.hood)) return false;
        return true;
      });
    }
    function activeFilterCount() {
      const f = state.filter;
      return (f.withShowsOnly ? 1 : 0) + (f.hideSubrooms ? 1 : 0) + (f.hoods.size > 0 ? 1 : 0);
    }

    function renderList() {
      const pool = applyFilter(state.venues);
      const sort = SORTS.find((s) => s.key === state.sortKey);
      const kicker = state.filter.hoods.size > 0
        ? `${state.filter.hoods.size} neighborhood${state.filter.hoods.size === 1 ? "" : "s"}`
        : "All neighborhoods";
      document.getElementById("slab-kicker").textContent = kicker;

      let html;
      if (sort.grouped) {
        // Grouped: by hood, alpha within
        const groups = new Map();
        for (const v of pool) {
          const key = v.hood || "";
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(v);
        }
        const hooded = [...groups.entries()].filter(([h]) => h).sort(([a], [b]) => a.localeCompare(b));
        const unhooded = groups.get("") || [];
        const hoodCount = hooded.length;

        document.getElementById("count").textContent =
          `${pool.length} venues · ${hoodCount} neighborhood${hoodCount === 1 ? "" : "s"}`;

        html = hooded.map(([hood, list]) => renderGroup(hood, list.sort(cmpName), false)).join("");
        if (unhooded.length) html += renderGroup("Unassigned", unhooded.sort(cmpName), true);
      } else {
        // Flat: no group headers
        let flat = pool.slice();
        if (state.sortKey === "az") flat.sort(cmpName);
        else if (state.sortKey === "shows") flat.sort((a, b) => (state.showCount.get(b.id) || 0) - (state.showCount.get(a.id) || 0) || cmpName(a, b));
        document.getElementById("count").textContent = `${flat.length} venues · sorted ${sort.label.toLowerCase()}`;
        html = `<ul class="vlist">` + flat.map((v) => renderRow(v, state.sortKey === "shows")).join("") + `</ul>`;
      }

      if (!pool.length) html = `<p class="empty">No venues match the filter.</p>`;

      document.getElementById("list").innerHTML = html;
      document.querySelectorAll(".vrow").forEach((el) => {
        el.addEventListener("click", () => selectVenue(el.dataset.vid));
        if (el.dataset.vid === state.selectedId) el.classList.add("sel");
      });
    }

    function renderRow(v, showCountBadge) {
      const badge = showCountBadge && state.showCount.get(v.id) > 0
        ? `<span class="hood-count" style="float:right;font-size:10px;color:var(--tomato);font-weight:800;">${state.showCount.get(v.id)}</span>`
        : "";
      return `<li><button class="vrow" data-vid="${esc(v.id)}">${badge}${esc(v.name)}</button></li>`;
    }

    function renderGroup(title, venues, missing) {
      const rows = venues.map((v) => renderRow(v, false)).join("");
      return `
        <section class="hood-group">
          <h2 class="hood-title${missing ? ' missing' : ''}">
            <span>${esc(title)}</span>
            <span class="hood-count">${venues.length}</span>
          </h2>
          <ul class="vlist">${rows}</ul>
        </section>
      `;
    }

    // ---------- controls: filter + sort panels ----------
    function renderControls() {
      document.getElementById("btn-filter").addEventListener("click", () => togglePanel("filter"));
      document.getElementById("btn-sort").addEventListener("click", () => togglePanel("sort"));
      renderBadges();
      renderFilterPanel();
      renderSortPanel();
    }

    function togglePanel(name) {
      state.openPanel = state.openPanel === name ? null : name;
      document.getElementById("btn-filter").classList.toggle("open", state.openPanel === "filter");
      document.getElementById("btn-sort").classList.toggle("open", state.openPanel === "sort");
      document.getElementById("filter-panel").style.display = state.openPanel === "filter" ? "flex" : "none";
      document.getElementById("sort-panel").style.display = state.openPanel === "sort" ? "flex" : "none";
    }

    function renderBadges() {
      const fCount = activeFilterCount();
      const fb = document.getElementById("filter-badge");
      fb.textContent = fCount;
      fb.style.display = fCount > 0 ? "inline-block" : "none";

      const sb = document.getElementById("sort-badge");
      const sortLabel = SORTS.find((s) => s.key === state.sortKey).label;
      sb.textContent = sortLabel.toUpperCase();
      sb.style.display = state.sortKey === "hood" ? "none" : "inline-block";
    }

    function renderFilterPanel() {
      const f = state.filter;
      const hoodChips = state.hoods.map((h) => {
        const on = f.hoods.has(h);
        return `<button class="chip${on ? " on" : ""}" data-hood="${esc(h)}">${esc(h)}</button>`;
      }).join("");
      const hasActive = activeFilterCount() > 0;
      document.getElementById("filter-panel").innerHTML = `
        <div class="frow">
          <span class="flabel">Show</span>
          <button class="chip${f.withShowsOnly ? " on" : ""}" data-toggle="withShowsOnly">With upcoming shows</button>
          <button class="chip${f.hideSubrooms ? " on" : ""}" data-toggle="hideSubrooms">Hide sub-rooms</button>
        </div>
        <div class="frow">
          <span class="flabel">Hoods</span>
          ${hoodChips}
          ${hasActive ? `<button class="chip clear" id="clear-filters">CLEAR ✕</button>` : ""}
        </div>
      `;
      const panel = document.getElementById("filter-panel");
      panel.querySelectorAll(".chip[data-toggle]").forEach((el) => {
        el.addEventListener("click", () => {
          const k = el.dataset.toggle;
          state.filter[k] = !state.filter[k];
          renderFilterPanel(); renderBadges(); renderList();
        });
      });
      panel.querySelectorAll(".chip[data-hood]").forEach((el) => {
        el.addEventListener("click", () => {
          const h = el.dataset.hood;
          if (state.filter.hoods.has(h)) state.filter.hoods.delete(h);
          else state.filter.hoods.add(h);
          renderFilterPanel(); renderBadges(); renderList();
        });
      });
      const clr = document.getElementById("clear-filters");
      if (clr) clr.addEventListener("click", () => {
        state.filter.withShowsOnly = false;
        state.filter.hideSubrooms = false;
        state.filter.hoods = new Set();
        renderFilterPanel(); renderBadges(); renderList();
      });
    }

    function renderSortPanel() {
      const html = `
        <div class="frow">
          <span class="flabel">Sort by</span>
          ${SORTS.map((s) => `<button class="chip${state.sortKey === s.key ? " on" : ""}" data-sort="${s.key}">${esc(s.label)}</button>`).join("")}
        </div>
      `;
      document.getElementById("sort-panel").innerHTML = html;
      document.getElementById("sort-panel").querySelectorAll(".chip[data-sort]").forEach((el) => {
        el.addEventListener("click", () => {
          state.sortKey = el.dataset.sort;
          renderSortPanel(); renderBadges(); renderList();
        });
      });
    }

    function selectVenue(id) {
      state.selectedId = id;
      state.activeTab = "upcoming"; // reset to first tab on new venue
      document.querySelectorAll(".vrow").forEach((el) => {
        el.classList.toggle("sel", el.dataset.vid === id);
      });
      renderDetail();
      document.getElementById("detailpane").scrollTop = 0;
      // Mobile only: slide from list to detail
      document.getElementById("stage").classList.add("venue-active");
    }

    function closeDetail() {
      state.selectedId = null;
      document.querySelectorAll(".vrow").forEach((el) => el.classList.remove("sel"));
      document.getElementById("stage").classList.remove("venue-active");
      renderRest();
    }

    function setTab(t) {
      state.activeTab = t;
      renderDetail();
    }

    // ---------- show detail: sliding panel ----------
    function selectShow(showId) {
      const show = state.shows.find((s) => s.id === showId);
      if (!show) return;
      state.selectedShowId = showId;
      renderShowPane(show);
      document.getElementById("showpane").scrollTop = 0;
      document.getElementById("stage").classList.add("show-active");
      // Flip the sel state on the show rows (venue detail is in the left pane during the slide).
      document.querySelectorAll(".showrow").forEach((el) => {
        el.classList.toggle("sel", el.dataset.sid === showId);
      });
    }

    function closeShow() {
      const stage = document.getElementById("stage");
      stage.classList.remove("show-active");
      // Let the transition finish before clearing content, so the pane
      // doesn't flash empty as it slides back off-screen.
      setTimeout(() => {
        if (!stage.classList.contains("show-active")) {
          state.selectedShowId = null;
          document.getElementById("showdetail").innerHTML = "";
          document.querySelectorAll(".showrow").forEach((el) => el.classList.remove("sel"));
        }
      }, 340);
    }

    function findShowsForVenue(v) {
      const nn = normName(v.name);
      return state.shows.filter((s) => (s.venueId && s.venueId === v.id) || normName(s.venue) === nn);
    }

    function renderShowList(shows, emptyMsg) {
      if (!shows.length) {
        return `<ul class="showlist"><li><span class="who" style="color:var(--ink-soft)">${esc(emptyMsg)}</span></li></ul>`;
      }
      const items = shows.map((s) => {
        const d = fmtDate(s.date);
        const priceCls = s.price === "FREE" ? " free" : "";
        const priceTxt = s.price === "FREE" ? "FREE" : (s.price != null ? `$${s.price}` : "");
        const headliner = (s.headliners?.[0]?.name) || s.venue || "";
        const openers = (s.openers || []).map((o) => o.name).filter(Boolean).slice(0, 2);
        const who = openers.length ? `${esc(headliner)} <span style="opacity:.55">/ ${esc(openers.join(" / "))}</span>` : esc(headliner);
        return `
          <li>
            <button class="showrow" data-sid="${esc(s.id)}">
              <span class="when">${esc(d)}</span>
              <span class="who">${who}</span>
              <span class="price${priceCls}">${esc(priceTxt)}</span>
            </button>
          </li>
        `;
      }).join("");
      return `<ul class="showlist">${items}</ul>`;
    }

    // ---------- show detail rendering (matches calendar page structure) ----------
    function renderShowPane(s) {
      const venue = state.venues.find((v) => v.id === s.venueId) || null;
      const dateStr = fmtLongDate(s.date);
      const timeStr = s.time ? fmt12h(s.time) : null;
      const price = s.price === "FREE" ? "FREE" : (s.price != null ? `$${s.price}` : "TBD");
      const priceFree = s.price === "FREE" ? " free" : "";
      const age = s.age || "TBD";
      const headliner = (s.headliners?.[0]?.name) || s.venue || "";

      const facts = `
        <div class="d-facts">
          <div class="d-fact">
            <div class="k">Date</div>
            <div class="v">${esc(dateStr)}</div>
          </div>
          <div class="d-fact">
            <div class="k">Time</div>
            <div class="v${timeStr ? "" : " dim"}">${esc(timeStr || "TBD")}</div>
          </div>
          <div class="d-fact">
            <div class="k">Price</div>
            <div class="v${priceFree}${s.price == null ? " dim" : ""}">${esc(price)}</div>
          </div>
          <div class="d-fact">
            <div class="k">Age</div>
            <div class="v${s.age ? "" : " dim"}">${esc(age)}</div>
          </div>
        </div>
      `;

      const posterHtml = s.poster
        ? `<div class="d-poster"><img src="${esc(s.poster)}" alt=""/></div>`
        : "";

      // Lineup: headliners then openers, calendar-style
      const artistRow = (a) => `
        <div class="artist">
          <div>
            <div class="nm">${esc(a.name)}</div>
            ${a.genre && a.genre !== "music" ? `<div class="gn">${esc(a.genre)}</div>` : ""}
          </div>
          <a class="spot" href="https://open.spotify.com/search/${encodeURIComponent(a.name)}" target="_blank" rel="noopener">SPOTIFY</a>
        </div>
      `;
      const headGroup = s.headliners?.length
        ? `<div class="lineup-group"><div class="role-label">Headliner${s.headliners.length > 1 ? "s" : ""}</div>${s.headliners.map(artistRow).join("")}</div>`
        : "";
      const openerGroup = s.openers?.length
        ? `<div class="lineup-group"><div class="role-label">Opener${s.openers.length > 1 ? "s" : ""}</div>${s.openers.map(artistRow).join("")}</div>`
        : "";

      const venueInfoHtml = venue ? `
        <div class="section venue-info">
          <h3>Venue</h3>
          <div class="v-name">${esc(venue.name)}</div>
          <p class="addr">${esc(venue.address || "")}${venue.hood ? ` · ${esc(venue.hood)}` : ""}</p>
          ${venue.website ? `<a class="d-ticket" style="margin-top:10px; box-shadow:2px 2px 0 var(--ink);" href="${esc(venue.website)}" target="_blank" rel="noopener">VENUE SITE</a>` : ""}
        </div>
      ` : "";

      const html = `
        <button class="d-back" onclick="closeShow()"><span class="arr">‹</span> BACK TO VENUE</button>
        ${posterHtml}
        <div class="d-head">
          <div class="kicker">${esc(s.venue || "")}</div>
          <div class="name">${esc(headliner)}</div>
          ${s.ticketUrl ? `<a class="d-ticket" href="${esc(s.ticketUrl)}" target="_blank" rel="noopener">BUY TICKETS →</a>` : ""}
        </div>
        ${facts}
        ${(headGroup || openerGroup) ? `
          <div class="section">
            <h3>Lineup</h3>
            ${headGroup}
            ${openerGroup}
          </div>` : ""}
        ${venueInfoHtml}
      `;
      document.getElementById("showdetail").innerHTML = html;
    }

    function fmtLongDate(iso) {
      if (!iso) return "TBD";
      const [y, m, d] = iso.split("-").map(Number);
      const dt = new Date(y, m - 1, d);
      const dow = ["SUN","MON","TUE","WED","THU","FRI","SAT"][dt.getDay()];
      const mon = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"][m - 1];
      return `${dow} · ${mon} ${d}`;
    }
    function fmt12h(hhmm) {
      const [h, m] = hhmm.split(":").map(Number);
      const suffix = h >= 12 ? "PM" : "AM";
      const h12 = ((h + 11) % 12) + 1;
      return `${h12}:${String(m).padStart(2, "0")} ${suffix}`;
    }

    function renderDetail() {
      const v = state.venues.find((x) => x.id === state.selectedId);
      if (!v) { renderRest(); return; }

      const allShows = findShowsForVenue(v);
      const today = new Date().toISOString().slice(0, 10);
      const upcoming = allShows.filter((s) => s.date >= today).sort((a, b) => (a.date + (a.time || "")).localeCompare(b.date + (b.time || "")));

      const children = state.venues.filter((x) => x.parent === v.id);
      const details = state.details[v.id] || null;

      const tabs = [
        { key: "upcoming", label: "Upcoming shows", count: upcoming.length },
        { key: "details",  label: "Venue details",  count: details ? "•" : "", dim: !details },
      ];
      const tabBar = `
        <div class="tabs">
          ${tabs.map((t) => `
            <button class="tab-btn${state.activeTab === t.key ? " on" : ""}" data-tab="${t.key}">
              <span>${esc(t.label)}</span>
              ${t.count !== "" && t.count !== 0 ? `<span class="n${t.dim ? " dim" : ""}">${esc(String(t.count))}</span>` : ""}
            </button>
          `).join("")}
        </div>
      `;

      // Guard: if user was on a tab that no longer exists, snap back to upcoming.
      if (!tabs.some((t) => t.key === state.activeTab)) state.activeTab = "upcoming";

      const tabBody = state.activeTab === "upcoming"
        ? renderShowList(upcoming, "No upcoming shows in the current data.")
        : renderDetailsTab(v, details);

      const html = `
        <div class="d-head">
          <div class="kicker">${esc(v.hood || "Neighborhood unassigned")}</div>
          <div class="name">${esc(v.name)}</div>
          ${v.aliases?.length ? `<div class="aka">Also known as: ${esc(v.aliases.join(", "))}</div>` : ""}
        </div>
        ${children.length ? `
          <div class="section">
            <h3>Sub-rooms</h3>
            <ul class="subrooms">
              ${children.map((c) => `<li><button class="chip" data-vid="${esc(c.id)}" onclick="selectVenue('${esc(c.id)}')">${esc(c.name)}</button></li>`).join("")}
            </ul>
          </div>` : ""}
        ${tabBar}
        <div id="tab-body">${tabBody}</div>
      `;
      document.getElementById("detail").innerHTML = html;

      document.querySelectorAll(".tab-btn").forEach((el) => {
        el.addEventListener("click", () => setTab(el.dataset.tab));
      });
      // Wire up show-row clicks (upcoming tab) + reflect current selection
      document.querySelectorAll(".showrow").forEach((el) => {
        el.addEventListener("click", () => selectShow(el.dataset.sid));
        if (el.dataset.sid === state.selectedShowId) el.classList.add("sel");
      });
    }

    function renderDetailsTab(v, d) {
      // Compose an address + website block from the registry entry, plus any hand-curated content from venue-details.json.
      const kvRows = [];
      if (v.address) kvRows.push(["Address", esc(v.address)]);
      if (v.hood) kvRows.push(["Neighborhood", esc(v.hood)]);
      if (v.website) kvRows.push(["Website", `<a href="${esc(v.website)}" target="_blank" rel="noopener">${esc(prettyUrl(v.website))}</a>`]);

      if (d?.facts) {
        for (const [k, val] of Object.entries(d.facts)) kvRows.push([k, esc(val)]);
      }
      if (d?.socials) {
        for (const [k, val] of Object.entries(d.socials)) {
          if (val) kvRows.push([k[0].toUpperCase() + k.slice(1), `<a href="${esc(val)}" target="_blank" rel="noopener">${esc(prettyUrl(val))}</a>`]);
        }
      }

      const kvHtml = kvRows.length
        ? `<ul class="kv-grid">${kvRows.map(([k, v]) => `<li><span class="k">${esc(k)}</span><span class="v">${v}</span></li>`).join("")}</ul>`
        : "";

      const blurbHtml = d?.blurb ? `<div class="blurb">${esc(d.blurb)}</div>` : "";

      const genresHtml = d?.genres?.length
        ? `<div class="section"><h3>Genres booked</h3><div class="tag-list">${d.genres.map((g) => `<span class="tag">${esc(g)}</span>`).join("")}</div></div>`
        : "";

      const notesHtml = d?.notes?.length
        ? `<div class="section"><h3>Notes</h3><ul class="notes-list">${d.notes.map((n) => `<li>${esc(n)}</li>`).join("")}</ul></div>`
        : "";

      const missingHint = !d
        ? `<div class="section"><p style="color:var(--ink-soft); font-size:13px;">This venue doesn't have curated details yet — only the address, neighborhood, and website from the master list are shown above. Curated details (capacity, genres, notes) get added to <code>venue-details.json</code>.</p></div>`
        : "";

      return `
        ${blurbHtml}
        <div class="section"><h3>Basics</h3>${kvHtml || `<p style="color:var(--ink-soft); font-size:13px;">No basic info recorded.</p>`}</div>
        ${genresHtml}
        ${notesHtml}
        ${missingHint}
      `;
    }

    function prettyUrl(u) {
      try { return new URL(u).host.replace(/^www\./, "") + new URL(u).pathname.replace(/\/$/, ""); }
      catch { return u; }
    }

    function renderRest() {
      // One big flowing block of spans — wraps naturally to fill the pane.
      // Join with a space so the browser has a break point between phrases.
      const span = `<span>PICK A VENUE</span>`;
      const wall = `<div class="wall">${new Array(800).fill(span).join(" ")}</div>`;
      document.getElementById("detail").innerHTML = `
        <div class="rest">
          <div class="invite">SELECT A VENUE TO SEE UPCOMING SHOWS →</div>
          ${wall}
        </div>
      `;
    }

    function fmtDate(iso) {
      if (!iso) return "TBD";
      const [y, m, d] = iso.split("-").map(Number);
      const dt = new Date(y, m - 1, d);
      const dow = ["SUN","MON","TUE","WED","THU","FRI","SAT"][dt.getDay()];
      const mon = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"][m - 1];
      return `${dow} ${mon} ${d}`;
    }

    // expose for inline onclick handlers
    window.selectVenue = selectVenue;
    window.closeDetail = closeDetail;
    window.closeShow = closeShow;
  </script>
</body>
</html>
