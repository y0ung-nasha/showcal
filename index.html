<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>The Chicago Show Calendar</title>
<!--
  RUN ME:  serve this folder over http (fetch needs it), then open index.html
           e.g.   python3 -m http.server 8080      ->   http://localhost:8080/
  DATA:    put your pipeline's shows.json next to this file.
           No shows.json yet? It renders bundled SAMPLE DATA so you can look around.
  ROUTES:  #/         -> calendar mode (list = shows for selected day)
           #/venues   -> venues mode  (list = grouped venues)
-->
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>html,body,#root{height:100%} body{margin:0}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useCallback } = React;

/*
  THE CHICAGO SHOW CALENDAR — single-page app
  -------------------------------------------
  Two entry modes (calendar, venues) share a single column stack.
  Any link inside any column pushes a NEW column onto the stack.
  BACK always returns to the starting state (list + placeholder). We do
  NOT step back one; the stack blows away.

  Visible columns: 2 on desktop, 1 on mobile. Older columns slide off left.
  Stack depth is unbounded; the URL doesn't track it.

  Tokens: bone surface · tomato-red structure · ink lines+type.
  Display = Archivo Black. Data/chrome = JetBrains Mono.
*/

const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700;800&display=swap');

:root{
  --bg:#E9DCC1;
  --paper:#F6EEDC;
  --paper-2:#EFE4CC;
  --tomato:#E03C2C;
  --tomato-deep:#BE2E1F;
  --ink:#171210;
  --ink-soft:#6A5E50;
  --font-display:'Archivo Black','Arial Black',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,'SF Mono','Courier New',monospace;
  --col-w:50vw;
  --visible:2;
}
@media (max-width:820px){
  :root{ --col-w:100vw; --visible:1; }
}

*{box-sizing:border-box;margin:0;padding:0;}

.csc{
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  background:var(--bg); color:var(--ink);
  font-family:var(--font-mono); font-size:14px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
.csc *::selection{ background:var(--tomato); color:var(--paper); }

/* ---------- TOP BAR ---------- */
.topbar{
  display:flex; align-items:stretch; justify-content:space-between;
  border-bottom:3px solid var(--ink); background:var(--paper);
  flex:0 0 auto;
}
.wordmark{
  font-family:var(--font-display); color:var(--ink);
  font-size:20px; letter-spacing:-.02em; line-height:1;
  padding:14px 18px; text-transform:uppercase;
  display:flex; align-items:center; gap:0;
  background:transparent; border:none; cursor:pointer;
}
.wordmark .dot{ color:var(--tomato); }
.topbar-meta{
  display:flex; align-items:center; gap:18px;
  padding:0 18px; font-size:11px; letter-spacing:.14em;
  text-transform:uppercase; color:var(--ink-soft);
  border-left:3px solid var(--ink);
}
@media (max-width:720px){ .topbar-meta{ padding:0 12px; gap:12px; } .topbar-meta .loc{ display:none; } .wordmark{ font-size:15px; padding:12px 14px; } }
.topnav{
  color:var(--ink); text-decoration:none; font-weight:700;
  border-bottom:2px solid transparent; padding:2px 0;
  background:transparent; border-top:none; border-left:none; border-right:none;
  font-family:inherit; font-size:inherit; letter-spacing:inherit;
  text-transform:inherit; cursor:pointer;
  transition: color .1s, border-color .1s;
}
.topnav:hover{ color:var(--tomato); border-bottom-color:var(--tomato); }
.topnav.on{ color:var(--tomato); border-bottom-color:var(--tomato); }

/* ---------- BACK BAR (full-width, above the stage) ---------- */
.pane-back-bar{
  flex:0 0 auto; background:var(--ink); color:var(--paper);
  display:flex; border-bottom:3px solid var(--ink);
}
.pane-back{
  flex:1; text-align:left;
  font-family:var(--font-display); text-transform:uppercase;
  font-size:16px; letter-spacing:-.01em;
  background:transparent; color:var(--paper);
  border:none; padding:14px 20px; cursor:pointer;
  display:flex; align-items:center; gap:12px;
  transition:background .07s linear;
}
.pane-back:hover{ background:rgba(246,238,220,0.08); }
.pane-back .arr{
  font-family:var(--font-mono); font-weight:800; font-size:13px;
  border:2px solid var(--paper); padding:1px 8px; line-height:1.3;
}

/* ---------- STAGE (horizontal column stack, slides left as it grows) ---------- */
.panes{ flex:1 1 auto; min-height:0; display:flex; flex-direction:column; }
.stage-clip{ flex:1 1 auto; min-height:0; position:relative; overflow:hidden; }
.stage{
  display:flex; height:100%;
  transition: transform 320ms cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform;
}
.col{
  flex:0 0 var(--col-w); display:flex; flex-direction:column; min-height:0;
  overflow-y:auto;
  border-right:3px solid var(--ink);
}
.col:last-child{ border-right:none; }
/* All columns share the darker "detail" tone as their base surface. */
.col.list, .col.detail, .col.placeholder{ background:var(--bg); }

/* ---------- DATE RAIL (calendar mode, inside the list column) ---------- */
.rail-wrap{
  display:flex; align-items:stretch;
  border-bottom:3px solid var(--ink); background:var(--bg);
  flex:0 0 auto;
}
.rail-nav{
  font-family:var(--font-display); font-size:18px;
  background:var(--paper); color:var(--ink);
  border:none; cursor:pointer; padding:0 14px;
  border-right:3px solid var(--ink);
}
.rail-nav.next{ border-right:none; border-left:3px solid var(--ink); }
.rail-nav:hover:not(:disabled){ background:var(--tomato); color:var(--paper); }
.rail-nav:disabled{ opacity:.3; cursor:not-allowed; color:var(--ink-soft); }
.rail{ display:flex; overflow:hidden; flex:1; position:relative; }
.rail-track{ display:flex; flex:1; will-change:transform; }
.rail-track.sliding-next{ animation: railSlideNext 320ms cubic-bezier(0.4,0,0.2,1) forwards; }
.rail-track.sliding-prev{ animation: railSlidePrev 320ms cubic-bezier(0.4,0,0.2,1) forwards; }
@keyframes railSlideNext{ from{ transform:translateX(0); } to{ transform:translateX(-100%); } }
@keyframes railSlidePrev{ from{ transform:translateX(-100%); } to{ transform:translateX(0); } }
.rail-week{ display:flex; flex:0 0 100%; width:100%; }
.stub{
  flex:1 1 0; min-width:74px;
  display:flex; flex-direction:column; align-items:center;
  padding:8px 6px 7px; cursor:pointer;
  background:var(--paper); color:var(--ink);
  border-right:2px solid var(--ink);
  transition:background .08s linear,color .08s linear;
}
.stub:last-child{ border-right:none; }
.stub:hover{ background:var(--paper-2); }
.stub .dow{ font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft); }
.stub .dnum{ font-family:var(--font-display); font-size:22px; line-height:1; margin:2px 0 5px; }
.stub .perf{ width:100%; border-top:2px dashed var(--ink); opacity:.45; margin-bottom:5px; }
.stub .cnt{
  font-size:10px; font-weight:800; letter-spacing:.04em;
  border:2px solid var(--ink); padding:1px 6px; min-width:26px; text-align:center;
}
.stub .cnt.zero{ color:var(--ink-soft); border-color:var(--ink-soft); }
.stub.active{ background:var(--tomato); color:var(--paper); }
.stub.active .dow{ color:var(--paper); }
.stub.active .perf{ border-color:var(--paper); }
.stub.active .cnt{ border-color:var(--paper); color:var(--paper); }

/* ---------- DAY / TITLE SLAB ---------- */
.slab{
  flex:0 0 auto; background:var(--bg);
  border-bottom:3px solid var(--ink); padding:14px 16px 12px;
}
.slab .kicker{ font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--tomato); font-weight:700; }
.slab .big{
  font-family:var(--font-display); text-transform:uppercase;
  font-size:clamp(28px,5vw,46px); line-height:.92; letter-spacing:-.02em;
  margin-top:2px;
}
.slab .count{ font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft); margin-top:6px; }
.slab .count b{ color:var(--ink); }

/* ---------- CONTROLS (filter/sort toggles + panels) ---------- */
.controls{
  flex:0 0 auto; display:flex;
  background:var(--bg); border-bottom:3px solid var(--ink);
}
.ctrl-btn{
  flex:1; display:flex; align-items:center; justify-content:center; gap:8px;
  font-family:var(--font-mono); font-weight:800; font-size:12px;
  letter-spacing:.12em; text-transform:uppercase;
  background:var(--paper); color:var(--ink);
  border:none; border-right:3px solid var(--ink); padding:11px 14px; cursor:pointer;
  transition:background .07s linear, color .07s linear;
}
.ctrl-btn:last-child{ border-right:none; }
.ctrl-btn:hover{ background:var(--paper-2); }
.ctrl-btn.open{ background:var(--tomato); color:var(--paper); }
.ctrl-btn .caret{ font-size:9px; }
.ctrl-btn .badge{
  background:var(--ink); color:var(--paper);
  font-size:10px; font-weight:800; padding:1px 6px; line-height:1.4;
}
.ctrl-btn.open .badge{ background:var(--paper); color:var(--tomato); }

.panel{
  flex:0 0 auto; background:var(--bg); border-bottom:3px solid var(--ink);
  padding:9px 12px; display:flex; flex-direction:column; gap:7px;
}
.frow{ display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
.flabel{ font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft); flex:0 0 auto; margin-right:4px; }
.chip{
  font-family:var(--font-mono); font-size:11px; font-weight:700;
  letter-spacing:.04em; text-transform:uppercase;
  background:var(--paper); color:var(--ink);
  border:2px solid var(--ink); padding:3px 9px; cursor:pointer;
  transition:transform .07s linear, box-shadow .07s linear;
}
.chip:hover{ box-shadow:2px 2px 0 var(--ink); transform:translate(-1px,-1px); }
.chip.on{ background:var(--tomato); color:var(--paper); box-shadow:2px 2px 0 var(--ink); }
.chip.clear{ background:var(--ink); color:var(--paper); margin-left:auto; }
.chip.clear:hover{ background:var(--tomato-deep); }

/* ---------- MAD-LIB FILTER (calendar) ---------- */
.madlib{
  display:flex; flex-wrap:wrap; align-items:center; gap:7px 8px;
  font-family:var(--font-display); text-transform:uppercase;
  font-size:14px; letter-spacing:-.01em; line-height:1.4; color:var(--ink);
}
.madlib .lex{ color:var(--ink-soft); }
.slot{
  font-family:var(--font-mono); font-weight:800; font-size:12px;
  letter-spacing:.03em; text-transform:uppercase;
  background:var(--paper); color:var(--ink);
  border:2px solid var(--ink); padding:3px 9px; cursor:pointer;
  box-shadow:2px 2px 0 var(--ink);
  display:inline-flex; align-items:center; gap:7px;
  transition:transform .07s linear, box-shadow .07s linear;
}
.slot:hover{ transform:translate(-1px,-1px); box-shadow:3px 3px 0 var(--ink); }
.slot.filled{ background:var(--tomato); color:var(--paper); }
.slot .car{ font-size:8px; }
.madlib-clear{ margin-left:0; margin-top:10px; align-self:flex-start; }

/* ---------- PICKER MODAL ---------- */
.picker-scrim{
  position:absolute; inset:0; z-index:60;
  background:rgba(23,18,16,.55);
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.picker{
  width:100%; max-width:420px; max-height:74vh;
  display:flex; flex-direction:column;
  background:var(--paper); border:3px solid var(--ink); box-shadow:8px 8px 0 var(--ink);
}
.picker-head{
  display:flex; align-items:baseline; justify-content:space-between;
  background:var(--tomato); color:var(--paper); border-bottom:3px solid var(--ink);
  padding:12px 14px;
  font-family:var(--font-display); text-transform:uppercase; font-size:17px; letter-spacing:-.01em;
}
.picker-head span:last-child{ font-family:var(--font-mono); font-size:11px; font-weight:700; letter-spacing:.08em; }
.picker-body{ overflow-y:auto; flex:1 1 auto; }
.opt{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left;
  background:var(--paper); color:var(--ink);
  border:none; border-bottom:2px solid var(--ink); padding:11px 14px; cursor:pointer;
  font-family:var(--font-mono); font-size:13px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
}
.opt:hover{ background:var(--paper-2); }
.opt.on{ background:var(--tomato); color:var(--paper); }
.opt .box{
  width:18px; height:18px; flex:0 0 auto;
  border:2px solid currentColor; display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:800;
}
.opt-name{ flex:1 1 auto; }
.opt-count{
  flex:0 0 auto; min-width:24px; text-align:center;
  font-size:11px; font-weight:800; letter-spacing:.02em;
  border:2px solid currentColor; padding:1px 6px;
}
.picker-foot{ display:flex; border-top:3px solid var(--ink); flex:0 0 auto; }
.pbtn{
  flex:1; font-family:var(--font-mono); font-weight:800; font-size:12px;
  letter-spacing:.1em; text-transform:uppercase; padding:13px; cursor:pointer; border:none;
  background:var(--paper); color:var(--ink);
}
.pbtn.clear{ border-right:3px solid var(--ink); }
.pbtn.clear:hover{ background:var(--paper-2); }
.pbtn.primary{ background:var(--ink); color:var(--paper); }
.pbtn.primary:hover{ background:var(--tomato-deep); }

/* ---------- LIST ROW (shows + venues share the same box model) ---------- */
.list{ flex:1 1 auto; overflow-y:auto; min-height:0; }
.row, .vrow{
  display:block; width:100%; text-align:left; cursor:pointer;
  background:var(--bg); color:var(--ink);
  font-family:var(--font-mono);
  border:none; border-bottom:2px solid var(--ink);
  border-left:6px solid transparent;
  padding:12px 14px; position:relative;
  transition:background .07s linear, border-color .07s linear;
}
.row:hover, .vrow:hover{ background:var(--paper-2); border-left-color:var(--tomato); }
/* Kicker: venue · hood on shows, hood on venues. Both tomato red. */
.row .venue, .vrow .kicker{
  font-size:10px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--tomato); font-weight:700;
  display:flex; gap:8px; align-items:center;
}
.row .venue .hood:before, .vrow .kicker .hood:before{ content:"· "; }
/* Big line: headliner on shows, venue name on venues. */
.row .head, .vrow .head{
  font-family:var(--font-display); text-transform:uppercase;
  font-size:19px; line-height:1; letter-spacing:-.01em; margin:5px 0 8px;
}
.row .meta, .vrow .meta{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.tag{
  font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
  border:1.5px solid var(--ink); padding:1px 6px; background:var(--paper);
}
.pill{
  font-size:11px; font-weight:800; letter-spacing:.03em;
  margin-left:auto; display:flex; gap:6px; align-items:center;
}
.pill > * + *::before{ content:"·"; margin-right:6px; opacity:.55; }
.pill .price.free{ color:var(--tomato); }
.vrow .meta .count{
  margin-left:auto;
  font-family:var(--font-mono); font-size:11px; font-weight:800;
  letter-spacing:.06em; color:var(--tomato);
}

/* empty states */
.empty{ padding:40px 20px; text-align:center; }
.empty .x{ font-family:var(--font-display); font-size:clamp(26px,5vw,40px); text-transform:uppercase; line-height:1; }
.empty p{ font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft); margin-top:10px; }
.empty .chip{ display:inline-block; margin-top:16px; }
.loading{ padding:40px 20px; color:var(--ink-soft); font-size:12px; letter-spacing:.14em; text-transform:uppercase; }

/* ---------- VENUE LIST GROUPING ---------- */
.hood-group{ padding:0; }
.hood-title{
  font-family:var(--font-mono); font-size:13px; font-weight:800;
  letter-spacing:.18em; text-transform:uppercase; color:var(--tomato);
  padding:22px 16px 8px;
  display:flex; align-items:baseline; justify-content:space-between; gap:12px;
  background:var(--bg);
  border-bottom:2px solid rgba(224,60,44,0.25);
  margin-bottom:2px;
}
.hood-title.missing{ color:var(--ink-soft); border-bottom-color:rgba(106,94,80,0.2); }
.hood-title .hood-count{ font-size:11px; color:var(--ink-soft); font-weight:700; letter-spacing:.1em; }
.vlist{ list-style:none; margin:0; padding:0; }

/* ---------- DETAIL HEADER (venue + show) ---------- */
.d-head{ background:var(--tomato); color:var(--paper); border-bottom:3px solid var(--ink); padding:20px 20px 18px; }
.d-head .kicker{ font-size:11px; letter-spacing:.16em; text-transform:uppercase; font-weight:700; }
.d-head .venue{ font-size:14px; letter-spacing:.12em; text-transform:uppercase; font-weight:800; }
.d-head .title, .d-head .name{
  font-family:var(--font-display); text-transform:uppercase;
  font-size:clamp(30px,4.6vw,52px); line-height:.9; letter-spacing:-.02em; margin-top:8px;
}
.d-head .aka{ font-size:11px; letter-spacing:.08em; text-transform:uppercase; margin-top:10px; opacity:.85; }
.d-ticket{
  display:inline-block; margin-top:14px;
  font-family:var(--font-mono); font-weight:800; font-size:12px; letter-spacing:.08em;
  text-transform:uppercase; text-decoration:none;
  background:var(--paper); color:var(--ink); border:2px solid var(--ink);
  padding:8px 12px; box-shadow:3px 3px 0 var(--ink); cursor:pointer;
  transition:transform .07s linear, box-shadow .07s linear;
}
.d-ticket:hover{ transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--ink); }
.d-ticket:active{ transform:translate(3px,3px); box-shadow:0 0 0 var(--ink); }

.d-facts{ display:flex; gap:0; border-bottom:3px solid var(--ink); background:var(--bg); }
.d-fact{ flex:1; padding:11px 14px; border-right:2px solid var(--ink); }
.d-fact:last-child{ border-right:none; }
.d-fact .k{ font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft); }
.d-fact .v{ font-family:var(--font-display); font-size:18px; text-transform:uppercase; margin-top:3px; }
.d-fact .v.dim{ color:var(--ink-soft); }
.d-fact .v.free{ color:var(--tomato); }

.d-poster{ background:var(--ink); border-bottom:3px solid var(--ink); }
.d-poster img{ display:block; width:100%; height:360px; object-fit:contain; background:var(--ink); }

/* ---------- SECTIONS + LINEUP + VENUE INFO ---------- */
.section{ padding:16px 20px; border-bottom:2px solid var(--ink); }
.section h3{
  font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--tomato);
  font-weight:700; font-family:var(--font-mono); margin-bottom:12px;
}
.lineup-group + .lineup-group{ margin-top:14px; padding-top:12px; border-top:3px solid var(--ink); }
.role-label{
  font-family:var(--font-mono); font-size:10px; font-weight:700;
  letter-spacing:.16em; text-transform:uppercase; color:var(--tomato); margin-bottom:6px;
}
.artist{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:9px 0; border-top:2px dotted var(--ink);
}
.artist:first-of-type{ border-top:none; }
.artist .nm{ font-family:var(--font-display); text-transform:uppercase; font-size:18px; line-height:1; letter-spacing:-.01em; }
.artist .gn{ font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft); margin-top:4px; }
.spot{
  flex:0 0 auto; font-family:var(--font-mono); font-weight:800; font-size:11px;
  letter-spacing:.08em; text-transform:uppercase; text-decoration:none;
  background:var(--paper); color:var(--ink); border:2px solid var(--ink);
  padding:6px 10px; box-shadow:3px 3px 0 var(--ink); cursor:pointer;
  transition:transform .07s linear, box-shadow .07s linear, background .07s linear;
  white-space:nowrap;
}
.spot:hover{ background:var(--tomato); color:var(--paper); transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--ink); }
.spot:active{ transform:translate(3px,3px); box-shadow:0 0 0 var(--ink); }
.spot.search{ opacity:.65; }
.artist-links{ display:flex; flex-direction:column; gap:6px; align-items:flex-end; }

.v-name{ font-family:var(--font-display); text-transform:uppercase; font-size:18px; letter-spacing:-.01em; margin-bottom:6px; }
.venue-info p{ font-size:13px; color:var(--ink); }
.venue-info .addr{ color:var(--ink-soft); letter-spacing:.04em; }
.vlink{
  display:inline-block; margin-top:10px;
  font-family:var(--font-mono); font-weight:800; font-size:11px; letter-spacing:.08em;
  text-transform:uppercase; text-decoration:none;
  background:var(--paper); color:var(--ink); border:2px solid var(--ink);
  padding:6px 10px; box-shadow:3px 3px 0 var(--ink); cursor:pointer;
  transition:transform .07s linear, box-shadow .07s linear, background .07s linear;
}
.vlink:hover{ background:var(--tomato); color:var(--paper); transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--ink); }
.vlink:active{ transform:translate(3px,3px); box-shadow:0 0 0 var(--ink); }

/* ---------- VENUE-DETAIL TABS ---------- */
.tabs{
  display:flex; background:var(--bg); border-bottom:3px solid var(--ink);
  flex:0 0 auto;
}
.tab-btn{
  flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
  font-family:var(--font-mono); font-weight:800; font-size:11px;
  letter-spacing:.12em; text-transform:uppercase;
  background:var(--paper); color:var(--ink);

// Accept either pipeline schema (headliners/openers/genres) or sample schema (artists[]).
function adaptShow(raw) {
  let headliners = raw.headliners && raw.headliners.length ? raw.headliners : (raw.artists || []).filter((a) => a.role === "headliner");
  let openers = raw.openers && raw.openers.length ? raw.openers : (raw.artists || []).filter((a) => a.role === "opener");
  if (!headliners.length && raw.artists && raw.artists.length) { headliners = [raw.artists[0]]; openers = raw.artists.slice(1); }
  const genres = raw.genres && raw.genres.length
    ? [...new Set(raw.genres)]

// crude word-wrap for the SVG poster headline
function wrapWords(str, max) {
  const words = str.toUpperCase().split(" ");
  const lines = []; let line = "";
  for (const w of words) {
    if ((line + " " + w).trim().length > max && line) { lines.push(line.trim()); line = w; }
    else line = (line + " " + w).trim();
  }
  if (line) lines.push(line);
  return lines.slice(0, 4);
}
function makePoster(show) {
  const h = headlinerOf(show);

  const startY = 300 - ((lines.length - 1) * fs) / 2;
  const titleSvg = lines
    .map((ln, i) => `<text x="48" y="${startY + i * fs}" font-family="Arial Black, sans-serif" font-size="${fs}" fill="#F6EEDC" letter-spacing="-2">${ln}</text>`)
    .join("");
  const openersSvg = openers.length
    ? `<text x="48" y="${startY + lines.length * fs + 30}" font-family="Arial, sans-serif" font-weight="bold" font-size="26" fill="#F6EEDC">WITH ${openers.join(" + ").toUpperCase()}</text>`
    : "";

// Given a show, find the matching venue registry entry (id-first, then name).
function findVenueForShow(show, venues) {
  if (!show || !venues || !venues.length) return null;
  if (show.venueId) {
    const v = venues.find((x) => x.id === show.venueId);
    if (v) return v;
  }
  const nn = normName(show.venue);
  return venues.find((v) => normName(v.name) === nn || (v.aliases || []).some((a) => normName(a) === nn)) || null;
}
function findShowsForVenue(v, shows) {
  const nn = normName(v.name);
  return shows.filter((s) => (s.venueId && s.venueId === v.id) || normName(s.venue) === nn);
}

function useIsMobile() {

    const mq = window.matchMedia("(max-width: 820px)");
    const on = (e) => setIs(e.matches);
    mq.addEventListener("change", on);
    return () => mq.removeEventListener("change", on);
  }, []);
  return is;
}

    }
  }, [days]); // eslint-disable-line react-hooks/exhaustive-deps

  const curDay = days.find((d) => d.iso === dayIso) || days[0] || { iso: dayIso, date: parseDate(dayIso || todayIso), count: 0 };

  // ---------- venues-mode state ----------
  const [vFilter, setVFilter] = useState({ withShowsOnly: false, hideSubrooms: false, hoods: [] });
  const [vSortKey, setVSortKey] = useState("hood");
  const [vFiltersOpen, setVFiltersOpen] = useState(false);
  const [vSortOpen, setVSortOpen] = useState(false);

  const showCountByVenue = useMemo(() => {
    const byId = new Map();
    const byNorm = new Map();
    for (const s of shows) {
      if (s.venueId) byId.set(s.venueId, (byId.get(s.venueId) || 0) + 1);
      const nn = normName(s.venue);
      if (nn) byNorm.set(nn, (byNorm.get(nn) || 0) + 1);
    }
    const out = new Map();
    for (const v of venueRegistry) {
      const c = byId.get(v.id) ?? byNorm.get(normName(v.name)) ?? 0;
      out.set(v.id, c);
    }
    return out;
  }, [shows, venueRegistry]);

  const vHoodOptions = useMemo(() =>
    [...new Set(venueRegistry.map((v) => v.hood).filter(Boolean))].sort()
  , [venueRegistry]);

  const filteredVenues = useMemo(() => {
    return venueRegistry.filter((v) => {
      if (vFilter.withShowsOnly && (showCountByVenue.get(v.id) || 0) === 0) return false;
      if (vFilter.hideSubrooms && v.parent) return false;
      if (vFilter.hoods.length && !vFilter.hoods.includes(v.hood)) return false;
      return true;
    });
  }, [venueRegistry, vFilter, showCountByVenue]);

  const V_SORTS = [
    { key: "hood", label: "By neighborhood", grouped: true },
    { key: "az", label: "A–Z", grouped: false },
    { key: "shows", label: "Most shows", grouped: false },
  ];
  const vActiveFilterCount =
    (vFilter.withShowsOnly ? 1 : 0) + (vFilter.hideSubrooms ? 1 : 0) + (vFilter.hoods.length ? 1 : 0);
  const clearVFilter = () => setVFilter({ withShowsOnly: false, hideSubrooms: false, hoods: [] });

  // ---------- render helpers ----------
  // When the stack is empty we still render a placeholder column so desktop
  // shows [list, placeholder] side by side. On mobile only the list is visible
  // until the user pushes something.
  const cols = stack.length > 0 ? stack : [{ type: "placeholder" }];
  const totalCols = cols.length + 1; // +1 for the list column at index 0
  //   desktop: show the last two columns → offset by (stack.length - 1)
  //   mobile:  show only the top column → offset by stack.length
  const offset = isMobile ? stack.length : Math.max(0, stack.length - 1);
  const colUnit = isMobile ? 100 : 50; // vw per column
  const stageStyle = {
    width: `${totalCols * colUnit}vw`,
    transform: `translateX(-${offset * colUnit}vw)`,
  };

  const backVisible = stack.length > 0;

  return (
    <div className="csc">
      <style>{CSS}</style>

      {/* TOP BAR */}
      <header className="topbar">
        <button className="wordmark" onClick={() => { switchMode("calendar"); resetStack(); }}>
          THE CHICAGO SHOW CALENDAR<span className="dot">.</span>
        </button>
        <div className="topbar-meta">
          <button className={"topnav" + (mode === "calendar" ? " on" : "")} onClick={() => switchMode("calendar")}>CALENDAR</button>
          <button className={"topnav" + (mode === "venues" ? " on" : "")} onClick={() => switchMode("venues")}>VENUES</button>
          <span className="loc">CHICAGO IL</span>
        </div>
      </header>

      {/* BACK BAR (only when stack has pushed cols) */}
      {backVisible && (
        <div className="pane-back-bar">
          <button className="pane-back" onClick={resetStack} aria-label="Back to list">
            <span className="arr">‹</span> BACK
          </button>
        </div>
      )}

      {/* STAGE */}
      <div className="panes">
        <div className="stage-clip">
          <div className="stage" style={stageStyle}>
            {/* COLUMN 0: LIST */}
            <section className="col list">
              {mode === "calendar"
                ? <CalendarList
                    days={days} targetDays={targetDays} sliding={sliding}
                    dayIso={dayIso} setDayIso={setDayIso}
                    weekOffset={weekOffset} shiftWeek={shiftWeek} onSlideEnd={onSlideEnd}
                    curDay={curDay} todayIso={todayIso}
                    dayShows={dayShows} filtered={filtered}
                    filtersOpen={filtersOpen} setFiltersOpen={setFiltersOpen}
                    sortOpen={sortOpen} setSortOpen={setSortOpen}
                    activeFilterCount={activeFilterCount} anyFilter={anyFilter}
                    sortKey={sortKey} setSortKey={setSortKey}
                    selHoods={selHoods} selGenres={selGenres} selAges={selAges} freeOnly={freeOnly}
                    setFreeOnly={setFreeOnly} openPicker={openPicker} slotText={slotText}
                    clearAll={clearAll} SORTS={SORTS}
                    onOpenShow={(id) => pushCol({ type: "show", id })}
                  />
                : <VenuesList
                    venues={filteredVenues} sortKey={vSortKey}
                    filter={vFilter} setFilter={setVFilter}
                    filtersOpen={vFiltersOpen} setFiltersOpen={setVFiltersOpen}
                    sortOpen={vSortOpen} setSortOpen={setVSortOpen}
                    hoodOpts={vHoodOptions} showCountByVenue={showCountByVenue}
                    activeFilterCount={vActiveFilterCount} clearFilter={clearVFilter}
                    setSortKey={setVSortKey} SORTS={V_SORTS}
                    onOpenVenue={(id) => pushCol({ type: "venue", id })}
                  />
              }
            </section>

            {/* COLUMNS 1..N: pushed cols (or placeholder if empty) */}
            {cols.map((col, i) => {
              if (col.type === "placeholder") {
                const invite = mode === "calendar"
                  ? "SELECT A SHOW TO SEE THE FULL LINEUP →"
                  : "SELECT A VENUE TO SEE UPCOMING SHOWS →";
                const phrase = mode === "calendar" ? "PICK A SHOW" : "PICK A VENUE";
                return (
                  <section key={"ph"} className="col placeholder">
                    <div className="rest">
                      <div className="invite">{invite}</div>
                      <div className="wall">
                        {Array.from({ length: 800 }).flatMap((_, k) => [<span key={"s"+k}>{phrase}</span>, " "])}
                      </div>
                    </div>
                  </section>
                );
              }
              if (col.type === "venue") {
                return (
                  <section key={`v${i}-${col.id}`} className="col detail">
                    <VenuePane
                      venueId={col.id} venues={venueRegistry} details={venueDetails} shows={shows}
                      onOpenShow={(id) => pushCol({ type: "show", id })}
                      onOpenVenue={(id) => pushCol({ type: "venue", id })}
                    />
                  </section>
                );
              }
              if (col.type === "show") {
                return (
                  <section key={`s${i}-${col.id}`} className="col detail">
                    <ShowPane
                      showId={col.id} shows={shows} venues={venueRegistry}
                      onOpenVenue={(id) => pushCol({ type: "venue", id })}
                    />
                  </section>
                );
              }
              return null;
            })}
          </div>
        </div>
      </div>

      {/* MAD-LIB PICKER (calendar mode only) */}
      {picker && (
        <div className="picker-scrim" onClick={() => setPicker(null)}>
          <div className="picker" onClick={(e) => e.stopPropagation()}>
            <div className="picker-head">
              <span>{PICKER_META[picker].title}</span>
              <span>{draft.length} SELECTED</span>
            </div>
            <div className="picker-body">
              {PICKER_META[picker].opts.map(({ name, count }) => {
                const on = draft.includes(name);
                return (
                  <button key={name} className={"opt" + (on ? " on" : "")} onClick={() => toggleDraft(name)}>
                    <span className="box">{on ? "✕" : ""}</span>
                    <span className="opt-name">{name}</span>
                    <span className="opt-count">{count}</span>
                  </button>
                );
              })}
            </div>
            <div className="picker-foot">
              <button className="pbtn clear" onClick={() => setDraft([])}>CLEAR</button>
              <button className="pbtn primary" onClick={savePicker}>DONE</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================== CALENDAR LIST COLUMN ============================== */
function CalendarList(props) {
  const {
    days, targetDays, sliding, dayIso, setDayIso, weekOffset, shiftWeek, onSlideEnd,
    curDay, todayIso, dayShows, filtered,
    filtersOpen, setFiltersOpen, sortOpen, setSortOpen,
    activeFilterCount, anyFilter, sortKey, setSortKey,
    selHoods, selGenres, selAges, freeOnly, setFreeOnly, openPicker, slotText,
    clearAll, SORTS, onOpenShow,
  } = props;

  const renderWeek = (weekDays) => (
    <div className="rail-week">
      {weekDays.map((d) => {
        const active = d.iso === dayIso;
        return (
          <button key={d.iso} className={"stub" + (active ? " active" : "")} onClick={() => setDayIso(d.iso)}>
            <span className="dow">{DOW[d.date.getDay()]}</span>
            <span className="dnum">{d.date.getDate()}</span>
            <span className="perf" />
            <span className={"cnt" + (d.count === 0 ? " zero" : "")}>{d.count}</span>
          </button>
        );
      })}
    </div>
  );
  const trackCls = "rail-track" + (sliding ? " sliding-" + sliding.dir : "");

  return (
    <>
      <div className="rail-wrap">
        <button className="rail-nav" onClick={() => shiftWeek(-1)}
          disabled={weekOffset === 0 || sliding !== null} aria-label="Previous week">‹</button>
        <div className="rail">
          <div className={trackCls} onAnimationEnd={onSlideEnd}>
            {sliding && sliding.dir === "prev" && renderWeek(targetDays)}
            {renderWeek(days)}
            {sliding && sliding.dir === "next" && renderWeek(targetDays)}
          </div>
        </div>
        <button className="rail-nav next" onClick={() => shiftWeek(1)}
          disabled={sliding !== null} aria-label="Next week">›</button>
      </div>

      <div className="slab">
        <div className="kicker">{curDay.iso === todayIso ? "TONIGHT" : "SHOWS ON"}</div>
        <div className="big">{DOW[curDay.date.getDay()]} {MON[curDay.date.getMonth()]} {curDay.date.getDate()}</div>
        <div className="count">
          <b>{filtered.length}</b> {filtered.length === 1 ? "SHOW" : "SHOWS"}
          {anyFilter && <> · FILTERED FROM <b>{dayShows.length}</b></>}
        </div>
      </div>

      {dayShows.length > 0 && (
        <>
          <div className="controls">
            <button className={"ctrl-btn" + (filtersOpen ? " open" : "")}
              onClick={() => { setFiltersOpen(!filtersOpen); setSortOpen(false); }}>
              FILTERS {activeFilterCount > 0 && <span className="badge">{activeFilterCount}</span>}
              <span className="caret">{filtersOpen ? "▲" : "▼"}</span>
            </button>
            <button className={"ctrl-btn" + (sortOpen ? " open" : "")}
              onClick={() => { setSortOpen(!sortOpen); setFiltersOpen(false); }}>
              SORT {sortKey !== "default" && <span className="badge">1</span>}
              <span className="caret">{sortOpen ? "▲" : "▼"}</span>
            </button>
          </div>

          {filtersOpen && (
            <div className="panel">
              <div className="madlib">
                <span className="lex">SHOWS IN</span>
                <button className={"slot" + (selHoods.length ? " filled" : "")} onClick={() => openPicker("hood")}>
                  {slotText(selHoods, "ANYWHERE")} <span className="car">▾</span>
                </button>
                <span className="lex">PLAYING</span>
                <button className={"slot" + (selGenres.length ? " filled" : "")} onClick={() => openPicker("genre")}>
                  {slotText(selGenres, "ANY GENRE")} <span className="car">▾</span>
                </button>
                <span className="lex">FOR</span>
                <button className={"slot" + (selAges.length ? " filled" : "")} onClick={() => openPicker("age")}>
                  {slotText(selAges, "ANY AGE")} <span className="car">▾</span>
                </button>
                <span className="lex">·</span>
                <button className={"slot" + (freeOnly ? " filled" : "")} onClick={() => setFreeOnly(!freeOnly)}>
                  {freeOnly ? "FREE ONLY" : "ANY PRICE"}
                </button>
              </div>
              {activeFilterCount > 0 && (
                <button className="chip clear madlib-clear" onClick={clearAll}>CLEAR ALL ✕</button>
              )}
            </div>
          )}

          {sortOpen && (
            <div className="panel">
              <div className="frow">
                <span className="flabel">Sort by</span>
                {SORTS.map((s) => (
                  <button key={s.key} className={"chip" + (sortKey === s.key ? " on" : "")}
                    onClick={() => setSortKey(s.key)}>{s.label}</button>
                ))}
              </div>
            </div>
          )}
        </>
      )}

      <div className="list">
        {dayShows.length === 0 && (
          <div className="empty">
            <div className="x">No shows<br/>this day</div>
            <p>Pick another date on the rail above</p>
          </div>
        )}
        {dayShows.length > 0 && filtered.length === 0 && (
          <div className="empty">
            <div className="x">No shows<br/>match</div>
            <p>Loosen a filter to see more</p>
            <button className="chip clear" onClick={clearAll}>CLEAR FILTERS ✕</button>
          </div>
        )}
        {filtered.map((s) => {
          const h = headlinerOf(s);
          return (
            <button key={s.id} className="row" onClick={() => onOpenShow(s.id)}>
              <div className="venue">
                <span>{s.venue}</span>{s.hood && <span className="hood">{s.hood}</span>}
              </div>
              <div className="head">{h.name}</div>
              <div className="meta">
                {genresOf(s).filter((g) => g !== "music").slice(0, 3).map((g) => <span key={g} className="tag">{g}</span>)}
                <span className="pill">
                  {s.age && <span className="ages">{s.age}</span>}
                  <span className={"price" + (s.price === "FREE" ? " free" : "")}>{fmtPrice(s.price)}</span>
                </span>
              </div>
            </button>
          );
        })}
      </div>
    </>
  );
}

/* ============================== VENUES LIST COLUMN ============================== */
function VenuesList(props) {
  const {
    venues, sortKey, filter, setFilter,
    filtersOpen, setFiltersOpen, sortOpen, setSortOpen,
    hoodOpts, showCountByVenue, activeFilterCount, clearFilter, setSortKey, SORTS,
    onOpenVenue,
  } = props;

  const sortDef = SORTS.find((s) => s.key === sortKey);
  const kicker = filter.hoods.length > 0
    ? `${filter.hoods.length} neighborhood${filter.hoods.length === 1 ? "" : "s"}`
    : "All neighborhoods";

  let content;
  let count;
  if (sortDef.grouped) {
    const groups = new Map();
    for (const v of venues) {
      const k = v.hood || "";
      if (!groups.has(k)) groups.set(k, []);
      groups.get(k).push(v);
    }
    const hooded = [...groups.entries()].filter(([h]) => h).sort(([a], [b]) => a.localeCompare(b));
    const unhooded = groups.get("") || [];
    count = `${venues.length} venues · ${hooded.length} neighborhood${hooded.length === 1 ? "" : "s"}`;
    content = (
      <>
        {hooded.map(([hood, list]) => (
          <VenueGroup key={hood} title={hood} venues={list.slice().sort(cmpName)}
            showCountByVenue={showCountByVenue} onOpen={onOpenVenue} />
        ))}
        {unhooded.length > 0 && (
          <VenueGroup title="Unassigned" venues={unhooded.slice().sort(cmpName)}
            showCountByVenue={showCountByVenue} missing onOpen={onOpenVenue} />
        )}
      </>
    );
  } else {
    let flat = venues.slice();
    if (sortKey === "az") flat.sort(cmpName);
    else if (sortKey === "shows") flat.sort((a, b) => (showCountByVenue.get(b.id) || 0) - (showCountByVenue.get(a.id) || 0) || cmpName(a, b));
    count = `${flat.length} venues · sorted ${sortDef.label.toLowerCase()}`;
    content = (
      <ul className="vlist">
        {flat.map((v) => <VenueRow key={v.id} v={v} count={showCountByVenue.get(v.id) || 0} onOpen={onOpenVenue} />)}
      </ul>
    );
  }

  if (!venues.length) content = <p className="empty" style={{textTransform:"uppercase",letterSpacing:".14em"}}>No venues match the filter.</p>;

  const toggleHood = (h) => setFilter((f) => ({ ...f, hoods: f.hoods.includes(h) ? f.hoods.filter((x) => x !== h) : [...f.hoods, h] }));

  return (
    <>
      <div className="slab">
        <div className="kicker">{kicker}</div>
        <div className="big">VENUES</div>
        <div className="count">{count}</div>
      </div>

      <div className="controls">
        <button className={"ctrl-btn" + (filtersOpen ? " open" : "")}
          onClick={() => { setFiltersOpen(!filtersOpen); setSortOpen(false); }}>
          FILTER {activeFilterCount > 0 && <span className="badge">{activeFilterCount}</span>}
          <span className="caret">{filtersOpen ? "▲" : "▼"}</span>
        </button>
        <button className={"ctrl-btn" + (sortOpen ? " open" : "")}
          onClick={() => { setSortOpen(!sortOpen); setFiltersOpen(false); }}>
          SORT {sortKey !== "hood" && <span className="badge">{SORTS.find((s) => s.key === sortKey).label.toUpperCase()}</span>}
          <span className="caret">{sortOpen ? "▲" : "▼"}</span>
        </button>
      </div>

      {filtersOpen && (
        <div className="panel">
          <div className="frow">
            <span className="flabel">Show</span>
            <button className={"chip" + (filter.withShowsOnly ? " on" : "")}
              onClick={() => setFilter({ ...filter, withShowsOnly: !filter.withShowsOnly })}>With upcoming shows</button>
            <button className={"chip" + (filter.hideSubrooms ? " on" : "")}
              onClick={() => setFilter({ ...filter, hideSubrooms: !filter.hideSubrooms })}>Hide sub-rooms</button>
          </div>
          <div className="frow">
            <span className="flabel">Hoods</span>
            {hoodOpts.map((h) => (
              <button key={h} className={"chip" + (filter.hoods.includes(h) ? " on" : "")}
                onClick={() => toggleHood(h)}>{h}</button>
            ))}
            {activeFilterCount > 0 && <button className="chip clear" onClick={clearFilter}>CLEAR ✕</button>}
          </div>
        </div>
      )}

      {sortOpen && (
        <div className="panel">
          <div className="frow">
            <span className="flabel">Sort by</span>
            {SORTS.map((s) => (
              <button key={s.key} className={"chip" + (sortKey === s.key ? " on" : "")}
                onClick={() => setSortKey(s.key)}>{s.label}</button>
            ))}
          </div>
        </div>
      )}

      <div className="list">{content}</div>
    </>
  );
}

function VenueGroup({ title, venues, showCountByVenue, missing, onOpen }) {
  return (
    <section className="hood-group">
      <h2 className={"hood-title" + (missing ? " missing" : "")}>
        <span>{title}</span>
        <span className="hood-count">{venues.length}</span>
      </h2>
      <ul className="vlist">
        {venues.map((v) => (
          <VenueRow key={v.id} v={v} count={showCountByVenue.get(v.id) || 0} onOpen={onOpen} />
        ))}
      </ul>
    </section>
  );
}

// Shared list row for venues — mirrors the calendar row's kicker/head/meta box.
function VenueRow({ v, count, onOpen }) {
  return (
    <li>
      <button className="vrow" onClick={() => onOpen(v.id)}>
        {v.hood && (
          <div className="kicker"><span>{v.hood}</span></div>
        )}
        <div className="head">{v.name}</div>
        {count > 0 && (
          <div className="meta">
            <span className="count">{count} {count === 1 ? "SHOW" : "SHOWS"}</span>
          </div>
        )}
      </button>
    </li>
  );
}

/* ============================== VENUE PANE ============================== */
function VenuePane({ venueId, venues, details, shows, onOpenShow, onOpenVenue }) {
  const v = venues.find((x) => x.id === venueId);
  const [tab, setTab] = useState("upcoming");

  // Fallback if venue registry hasn't loaded (or unknown id): render a stub.
  if (!v) return <div className="loading">Venue not found (id: {venueId}).</div>;

  const d = details[v.id] || null;
  const allShows = findShowsForVenue(v, shows);
  const today = isoOf(new Date());
  const upcoming = allShows
    .filter((s) => s.date >= today)
    .sort((a, b) => (a.date + (a.time || "")).localeCompare(b.date + (b.time || "")));
  const children = venues.filter((x) => x.parent === v.id);

  const tabs = [
    { key: "upcoming", label: "Upcoming shows", count: upcoming.length },
    { key: "details", label: "Venue details", count: d ? "•" : "", dim: !d },
  ];

  return (
    <>
      <div className="d-head">
        <div className="kicker">{v.hood || "Neighborhood unassigned"}</div>
        <div className="name">{v.name}</div>
        {v.aliases?.length ? <div className="aka">Also known as: {v.aliases.join(", ")}</div> : null}
      </div>

      {children.length > 0 && (
        <div className="section">
          <h3>Sub-rooms</h3>
          <ul className="subrooms">
            {children.map((c) => (
              <li key={c.id}><button onClick={() => onOpenVenue(c.id)}>{c.name}</button></li>
            ))}
          </ul>
        </div>
      )}

      <div className="tabs">
        {tabs.map((t) => (
          <button key={t.key} className={"tab-btn" + (tab === t.key ? " on" : "")} onClick={() => setTab(t.key)}>
            <span>{t.label}</span>
            {t.count !== "" && t.count !== 0 && (
              <span className={"n" + (t.dim ? " dim" : "")}>{String(t.count)}</span>
            )}
          </button>
        ))}
      </div>

      {tab === "upcoming" ? (
        <VenueUpcoming shows={upcoming} onOpenShow={onOpenShow} />
      ) : (
        <VenueDetails v={v} d={d} />
      )}
    </>
  );
}

function VenueUpcoming({ shows, onOpenShow }) {
  if (!shows.length) {
    return (
      <div className="section">
        <p style={{ color: "var(--ink-soft)", fontSize: 13 }}>No upcoming shows in the current data.</p>
      </div>
    );
  }
  const line = (s) => {
    const d = parseDate(s.date);
    return `${DOW[d.getDay()]} ${MON[d.getMonth()]} ${d.getDate()}${s.time ? " · " + fmtTime(s.time) : ""}`;
  };
  return (
    <div className="section" style={{ padding: 0 }}>
      <ul className="showlist">
        {shows.map((s) => {
          const h = headlinerOf(s);
          const openers = (s.openers || []).map((o) => o.name).filter(Boolean).slice(0, 2);
          const priceFree = s.price === "FREE";
          const priceTxt = s.price === "FREE" ? "FREE" : (s.price != null ? `$${s.price}` : "");
          return (
            <li key={s.id}>
              <button className="showrow" onClick={() => onOpenShow(s.id)}>
                <span className="when">{line(s)}</span>
                <span className="who">
                  {h.name}
                  {openers.length ? <span className="op"> / {openers.join(" / ")}</span> : null}
                </span>
                {priceTxt && <span className={"price" + (priceFree ? " free" : "")}>{priceTxt}</span>}
              </button>
            </li>
          );
        })}
      </ul>
    </div>
  );
}

function VenueDetails({ v, d }) {
  const kvRows = [];
  if (v.address) kvRows.push(["Address", v.address]);
  if (v.hood) kvRows.push(["Neighborhood", v.hood]);
  if (v.website) kvRows.push(["Website", <a href={v.website} target="_blank" rel="noreferrer">{prettyUrl(v.website)}</a>]);
  if (d?.facts) for (const [k, val] of Object.entries(d.facts)) kvRows.push([k, val]);
  if (d?.socials) {
    for (const [k, val] of Object.entries(d.socials)) {
      if (val) kvRows.push([k[0].toUpperCase() + k.slice(1), <a href={val} target="_blank" rel="noreferrer">{prettyUrl(val)}</a>]);
    }
  }
  return (
    <>
      {d?.blurb && <div className="blurb">{d.blurb}</div>}
      <div className="section">
        <h3>Basics</h3>
        {kvRows.length ? (
          <ul className="kv-grid">
            {kvRows.map(([k, val], i) => (
              <li key={i}><span className="k">{k}</span><span className="v">{val}</span></li>
            ))}
          </ul>
        ) : (
          <p style={{ color: "var(--ink-soft)", fontSize: 13 }}>No basic info recorded.</p>
        )}
      </div>
      {d?.genres?.length > 0 && (
        <div className="section">
          <h3>Genres booked</h3>
          <div className="tag-list">
            {d.genres.map((g) => <span key={g} className="tag">{g}</span>)}
          </div>
        </div>
      )}
      {d?.notes?.length > 0 && (
        <div className="section">
          <h3>Notes</h3>
          <ul className="notes-list">
            {d.notes.map((n, i) => <li key={i}>{n}</li>)}
          </ul>
        </div>
      )}
      {!d && (
        <div className="section">
          <p style={{ color: "var(--ink-soft)", fontSize: 13 }}>
            This venue doesn't have curated details yet — only the address, neighborhood,
            and website from the master list are shown above. Curated details get added
            to <code>venue-details.json</code>.
          </p>
        </div>
      )}
    </>
  );
}

/* ============================== SHOW PANE ============================== */
function ShowPane({ showId, shows, venues, onOpenVenue }) {
  const s = shows.find((x) => x.id === showId);
  if (!s) return <div className="loading">Show not found (id: {showId}).</div>;

  const venue = findVenueForShow(s, venues);
  const d = parseDate(s.date);
  const dateStr = `${DOW[d.getDay()]} · ${MON[d.getMonth()]} ${d.getDate()}`;
  const timeStr = s.time ? fmtTime(s.time) : null;
  const price = s.price === "FREE" ? "FREE" : (s.price != null ? `$${s.price}` : "TBD");
  const priceFree = s.price === "FREE";
  const age = s.age || "TBD";
  const headliner = headlinerOf(s);

  const artistRow = (a) => (
    <div className="artist" key={a.name}>
      <div>
        <div className="nm">{a.name}</div>
        {a.genre && a.genre !== "music" && <div className="gn">{a.genre}</div>}
      </div>
      <div className="artist-links">
        <a className={"spot" + (a.spotify ? "" : " search")} target="_blank" rel="noreferrer"
          href={a.spotify || `https://open.spotify.com/search/${encodeURIComponent(a.name)}`}>SPOTIFY ↗</a>
        {a.bandcamp && <a className="spot" target="_blank" rel="noreferrer" href={a.bandcamp}>BANDCAMP ↗</a>}
      </div>
    </div>
  );

  const openVenue = () => { if (venue) onOpenVenue(venue.id); };

  return (
    <>
      {s.poster && (
        <div className="d-poster">
          <img src={typeof s.poster === "string" ? s.poster : makePoster(s)} alt={`${headliner.name} show poster`} />
        </div>
      )}

      <div className="d-head">
        <div className="venue">{s.venue}{s.hood ? ` · ${s.hood}` : ""}</div>
        <div className="title">{headliner.name}</div>
        {s.ticketUrl && <a className="d-ticket" href={s.ticketUrl} target="_blank" rel="noreferrer">BUY TICKETS ↗</a>}
      </div>

      <div className="d-facts">
        <div className="d-fact"><div className="k">Date</div><div className="v">{dateStr}</div></div>
        <div className="d-fact"><div className="k">Time</div><div className={"v" + (timeStr ? "" : " dim")}>{timeStr || "TBD"}</div></div>
        <div className="d-fact"><div className="k">Ages</div><div className={"v" + (s.age ? "" : " dim")}>{age}</div></div>
        <div className="d-fact"><div className="k">Price</div><div className={"v" + (priceFree ? " free" : "") + (s.price == null ? " dim" : "")}>{price}</div></div>
      </div>

      {(s.headliners?.length || s.openers?.length) ? (
        <div className="section">
          <h3>Lineup</h3>
          {s.headliners?.length > 0 && (
            <div className="lineup-group">
              <div className="role-label">Headlining</div>
              {s.headliners.map(artistRow)}
            </div>
          )}
          {s.openers?.length > 0 && (
            <div className="lineup-group">
              <div className="role-label">Openers</div>
              {s.openers.map(artistRow)}
            </div>
          )}
        </div>
      ) : null}

      <div className="section venue-info">
        <h3>Venue</h3>
        <div className="v-name">{venue?.name || s.venue}</div>
        {venue?.address && <p className="addr">{venue.address}{venue.hood ? ` · ${venue.hood}` : ""}</p>}
        {venue
          ? <button className="vlink" onClick={openVenue}>VENUE DETAILS ↗</button>
          : (s.venueInfo?.url || null) && <a className="vlink" href={s.venueInfo.url} target="_blank" rel="noreferrer">VENUE SITE ↗</a>
        }
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
